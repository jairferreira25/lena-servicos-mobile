name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython virtualenv
      - name: Aceitar licencas Android
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          mkdir -p $SDK_DIR/licenses
          echo "8933bad161af4178b1185d1a7d4e3e5c2e7d8c6a" > $SDK_DIR/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $SDK_DIR/licenses/android-sdk-preview-license
          echo "d975f751698a77b662f1254ddbeed3901e976f5a" > $SDK_DIR/licenses/intel-android-extra-license
      - name: Build APK
        env:
          _JAVA_OPTIONS: "-Dfile.encoding=UTF-8"
        run: buildozer android debug 2>&1
      - name: Enviar APK
        uses: actions/upload-artifact@v4
        with:
          name: Lena-Servicos-APK
          path: bin/*.apk
