name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython==0.29.33 virtualenv
      - name: Build APK
        env:
          APP_ANDROID_ACCEPT_SDK_LICENSE: "1"
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: yes | buildozer -v android debug 2>&1
      - name: Enviar APK
        uses: actions/upload-artifact@v4
        with:
          name: Lena-Servicos-APK
          path: bin/*.apk
