name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          sudo apt update
          sudo apt install -y git zip unzip openjdk-17-jdk autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev cmake libffi-dev libssl-dev
          pip install --upgrade buildozer cython virtualenv
      - name: Aceitar licencas Android
        run: |
          SDK_DIR=$HOME/.buildozer/android/platform/android-sdk
          CMDLINE_TOOLS_URL="https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip"
          # Baixar e extrair cmdline-tools
          mkdir -p $SDK_DIR
          curl -sL "$CMDLINE_TOOLS_URL" -o /tmp/cmdline-tools.zip
          unzip -q /tmp/cmdline-tools.zip -d /tmp/cmdline-tools
          mkdir -p $SDK_DIR/cmdline-tools/latest
          mv /tmp/cmdline-tools/cmdline-tools/* $SDK_DIR/cmdline-tools/latest/
          rm -rf /tmp/cmdline-tools /tmp/cmdline-tools.zip
          # Aceitar licencas
          yes | $SDK_DIR/cmdline-tools/latest/bin/sdkmanager --sdk_root=$SDK_DIR --licenses 2>&1 || true
      - name: Build APK
        env:
          _JAVA_OPTIONS: "-Dfile.encoding=UTF-8"
        run: buildozer android debug 2>&1
      - name: Enviar APK
        uses: actions/upload-artifact@v4
        with:
          name: Lena-Servicos-APK
          path: bin/*.apk
